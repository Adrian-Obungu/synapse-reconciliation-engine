version: '3.8'

services:
  app:
    build: .
    container_name: mobile-courier-app
    hostname: app
    ports:
      - "8000:8000"
    environment:
      - MOCK_ETIMS=true
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_DSN=postgresql://synapse_user:synapse_pass@postgres:5432/synapse
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - telemetry-bridge
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  redis:
    image: redis:7-alpine
    container_name: mobile-courier-redis
    hostname: redis
    ports:
      - "6379:6379"
    networks:
      - telemetry-bridge
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: mobile-courier-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: synapse_pass
      POSTGRES_DB: synapse
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - telemetry-bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse_user -d synapse"]
      interval: 5s
      timeout: 3s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: mobile-courier-otel-collector
    hostname: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver exposed to local host
      - "4318:4318" # OTLP http receiver exposed to local host
      - "8889:8889" # Prometheus metrics exporter port
    networks:
      - telemetry-bridge

  prometheus:
    image: prom/prometheus:latest
    container_name: mobile-courier-prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=exemplar-storage
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - telemetry-bridge

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: mobile-courier-jaeger
    hostname: jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # Model
      # FIXED: Removed the conflicting host port mapping "4317:4317" here.
      # Jaeger will still listen internally on 4317 for the otel-collector.
    networks:
      - telemetry-bridge

  grafana:
    image: grafana/grafana:latest
    container_name: mobile-courier-grafana
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - jaeger
    networks:
      - telemetry-bridge

networks:
  telemetry-bridge:
    driver: bridge