worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Edge Rate Limiting: 300 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/s;

    # Hide Nginx version
    server_tokens off;

    upstream fastapi_app {
        server app:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self';" always;

        location / {
            # Apply rate limiting with a burst queue of 50, processing immediately
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://fastapi_app;

            # Preserve Client IP context
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Strip upstream application server identifiers (e.g. uvicorn)
            proxy_hide_header Server;
        }
    }
}