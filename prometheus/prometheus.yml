global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  # Scrape job to track connection pool saturation and retry exhaustion from the FastAPI app directly
  - job_name: 'synapse_app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:8000']
